AWSTemplateFormatVersion: '2010-09-09'
Description: 'Family Password Manager - Backend Stack (Cognito included)'

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues:
      - dev
      - prod

Resources:

  # --- COGNITO ---
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    Properties:
      UserPoolName: !Sub '${Environment}-PasswordVaultUserPool'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: 'Your Family Password Manager verification code is {####}'
        EmailSubject: 'Verify your Family Password Manager account'
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${Environment}-PasswordVaultClient'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED

  # --- DYNAMODB ---
  PasswordVaultTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${Environment}-PasswordVault'
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: itemTypeId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: itemTypeId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # --- IAM ROLE ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-PasswordVaultRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaLoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'
        - PolicyName: DynamoDBReadWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource: !GetAtt PasswordVaultTable.Arn

  # --- LAMBDA FUNCTIONS ---
  CreateEntryFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub '${Environment}-CreateEntry'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: 'password-manager-944508510504'
        S3Key: 'lambda/createEntry.zip'
      Environment:
        Variables:
          TABLE_NAME: !Ref PasswordVaultTable

  ListEntriesFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub '${Environment}-ListEntries'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: 'password-manager-944508510504'
        S3Key: 'lambda/listEntries.zip'
      Environment:
        Variables:
          TABLE_NAME: !Ref PasswordVaultTable

  UpdateEntryFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub '${Environment}-UpdateEntry'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: 'password-manager-944508510504'
        S3Key: 'lambda/updateEntry.zip'
      Environment:
        Variables:
          TABLE_NAME: !Ref PasswordVaultTable

  DeleteEntryFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub '${Environment}-DeleteEntry'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: 'password-manager-944508510504'
        S3Key: 'lambda/deleteEntry.zip'
      Environment:
        Variables:
          TABLE_NAME: !Ref PasswordVaultTable

  # --- LAMBDA PERMISSIONS ---
  CreateEntryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateEntryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PasswordVaultApi}/*'

  ListEntriesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ListEntriesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PasswordVaultApi}/*'

  UpdateEntryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UpdateEntryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PasswordVaultApi}/*'

  DeleteEntryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DeleteEntryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PasswordVaultApi}/*'

  # --- API GATEWAY ---
  PasswordVaultApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${Environment}-PasswordVaultApi'
      ProtocolType: HTTP
      Description: 'API for the Family Password Manager'
      CorsConfiguration:
        AllowOrigins:
          - 'https://vosahlik-vault.com'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type

  CognitoAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref PasswordVaultApi
      AuthorizerType: JWT
      Name: CognitoAuthorizer
      IdentitySource:
        - '$request.header.Authorization'
      JwtConfiguration:
        Audience:
          - !Ref UserPoolClient
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PasswordVaultApi
      StageName: '$default'
      AutoDeploy: true

  # --- INTEGRATIONS ---
  CreateEntryIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PasswordVaultApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CreateEntryFunction.Arn
      PayloadFormatVersion: '2.0'

  ListEntriesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PasswordVaultApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ListEntriesFunction.Arn
      PayloadFormatVersion: '2.0'

  UpdateEntryIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PasswordVaultApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt UpdateEntryFunction.Arn
      PayloadFormatVersion: '2.0'

  DeleteEntryIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PasswordVaultApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt DeleteEntryFunction.Arn
      PayloadFormatVersion: '2.0'

  # --- ROUTES ---
  CreateEntryRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PasswordVaultApi
      RouteKey: 'POST /entries'
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Join ['/', ['integrations', !Ref CreateEntryIntegration]]

  ListEntriesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PasswordVaultApi
      RouteKey: 'GET /entries'
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Join ['/', ['integrations', !Ref ListEntriesIntegration]]

  UpdateEntryRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PasswordVaultApi
      RouteKey: 'PUT /entries/{itemTypeId}'
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Join ['/', ['integrations', !Ref UpdateEntryIntegration]]

  DeleteEntryRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PasswordVaultApi
      RouteKey: 'DELETE /entries/{itemTypeId}'
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Join ['/', ['integrations', !Ref DeleteEntryIntegration]]

  # --- CUSTOM DOMAIN ---
  ApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: 'dev-api.vosahlik-vault.com'
      DomainNameConfigurations:
        - CertificateArn: 'arn:aws:acm:us-east-1:944508510504:certificate/f06578f1-0a14-4151-900f-ee9597098725'
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    DependsOn:
      - ApiDomain
      - DefaultStage
    Properties:
      ApiId: !Ref PasswordVaultApi
      DomainName: !Ref ApiDomain
      Stage: !Ref DefaultStage

Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Description: 'Cognito User Pool ID — update your frontend config'

  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: 'Cognito App Client ID — update your frontend config'

  PasswordVaultTableName:
    Value: !Ref PasswordVaultTable
    Description: 'DynamoDB table name'

  ApiEndpoint:
    Value: !GetAtt PasswordVaultApi.ApiEndpoint
    Description: 'API Gateway endpoint URL'

  ApiCustomDomainUrl:
    Value: 'https://dev-api.vosahlik-vault.com'
    Description: 'API custom domain URL'
